<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Performance Dashboard — Week 202609</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --surface3:#232840;
    --border:#2a3050; --accent:#4f8ef7; --accent2:#7c5df9;
    --green:#2dd98a; --yellow:#f5c842; --red:#f25c5c;
    --text:#e8eaf0; --text2:#8b91a8; --text3:#5a6080;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}
  .shell{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{width:262px;min-width:262px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100;}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.3px;}
  .sidebar-logo p{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
  .nav-section{padding:12px 10px 4px;}
  .nav-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px 8px;font-weight:600;}
  .nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);
    cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;user-select:none;position:relative;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:rgba(79,142,247,.12);color:var(--accent);font-weight:500;}
  .nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:3px;height:18px;background:var(--accent);border-radius:0 2px 2px 0;}
  .nav-icon{font-size:13px;width:15px;text-align:center;flex-shrink:0;}
  .sup-badge{margin-left:auto;background:var(--surface3);color:var(--text3);font-size:10px;
    font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;flex-shrink:0;}

  /* Collapsible supervisor nav row */
  .sup-nav-row{display:flex;align-items:stretch;border-radius:var(--radius-sm);
    cursor:default;color:var(--text2);font-size:13px;transition:background .15s;user-select:none;position:relative;}
  .sup-nav-row:hover{background:var(--surface2);}
  .sup-nav-row.active{background:rgba(79,142,247,.12);color:var(--accent);font-weight:500;}
  .sup-nav-row.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:3px;height:18px;background:var(--accent);border-radius:0 2px 2px 0;}
  .sup-nav-main{display:flex;align-items:center;gap:8px;padding:8px 6px 8px 10px;flex:1;cursor:pointer;}
  .sup-chevron{padding:8px 10px 8px 4px;color:var(--text3);font-size:10px;transition:transform .22s;
    flex-shrink:0;cursor:pointer;display:flex;align-items:center;}
  .sup-chevron.open{transform:rotate(180deg);}

  .nav-sub{overflow:hidden;max-height:0;transition:max-height .28s ease;padding-left:8px;}
  .nav-sub.open{max-height:800px;}
  .nav-sub .nav-item{font-size:12px;padding:6px 10px;border-left:1px solid var(--border);
    border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-left:16px;color:var(--text3);}
  .nav-sub .nav-item:hover{color:var(--text);border-left-color:var(--accent);}
  .nav-sub .nav-item.active{color:var(--accent);border-left-color:var(--accent);}

  /* MAIN */
  .main{flex:1;overflow:auto;min-width:0;}
  .page{display:none;padding:28px 32px;animation:fadeIn .18s ease;max-width:100%;box-sizing:border-box;}
  .page.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  /* PAGE HEADER */
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;
    padding-bottom:18px;border-bottom:1px solid var(--border);}
  .page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-.5px;color:var(--text);}
  .page-sub{font-size:12px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;}
  .week-badge{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.25);
    padding:5px 13px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;white-space:nowrap;}

  /* STAT CARDS */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:11px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:15px 17px;position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.5;}
  .stat-card.green::after{background:var(--green);}
  .stat-card.yellow::after{background:var(--yellow);}
  .stat-card.red::after{background:var(--red);}
  .stat-card.purple::after{background:var(--accent2);}
  .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600;}
  .stat-value{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--text);line-height:1;}
  .stat-note{font-size:11px;color:var(--text3);margin-top:5px;}

  /* AGENT CARDS */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px;margin-bottom:20px;}
  .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer;}
  .agent-card:hover{border-color:var(--accent);transform:translateY(-1px);}
  .agent-card-header{display:flex;align-items:center;padding:13px 15px 11px;border-bottom:1px solid var(--border);cursor:pointer;}
  .agent-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;margin-right:10px;flex-shrink:0;}
  .agent-info{flex:1;}
  .agent-name{font-size:13px;font-weight:600;color:var(--text);}
  .score-ring{position:relative;width:50px;height:50px;flex-shrink:0;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text);}
  .agent-kpis{padding:11px 15px;}
  .kpi-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .kpi-row:last-child{margin-bottom:0;}
  .kpi-name{width:120px;font-size:11px;color:var(--text2);flex-shrink:0;}
  .kpi-bar-wrap{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
  .kpi-bar{height:100%;border-radius:3px;background:var(--accent);}
  .kpi-bar.green{background:var(--green);}
  .kpi-bar.yellow{background:var(--yellow);}
  .kpi-bar.red{background:var(--red);}
  .kpi-pct{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text2);width:42px;text-align:right;}

  /* SECTION HEADER */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;margin-top:22px;}
  .section-title{font-family:'Fraunces',serif;font-size:15.5px;font-weight:600;color:var(--text);}

  /* TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:10px;font-weight:600;
    color:var(--text3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
  tbody td{padding:9px 12px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text2);vertical-align:middle;}
  tbody tr:hover td{background:var(--surface2);}
  .clickable-row{cursor:pointer;}
  .clickable-row:hover td{background:rgba(79,142,247,.06)!important;}

  /* TAGS */
  .tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;}
  .tag-green{background:rgba(45,217,138,.12);color:var(--green);}
  .tag-yellow{background:rgba(245,200,66,.12);color:var(--yellow);}
  .tag-red{background:rgba(242,92,92,.12);color:var(--red);}
  .tag-blue{background:rgba(79,142,247,.12);color:var(--accent);}
  .tag-gray{background:var(--surface3);color:var(--text3);}

  /* FIELD INPUTS */
  .field-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11.5px;padding:4px 8px;font-family:'DM Mono',monospace;outline:none;}
  .field-input:focus{border-color:var(--accent);color:var(--text);}
  select.field-input{cursor:pointer;}

  .editable{border:1px solid transparent;border-radius:6px;padding:3px 5px;margin:-3px -5px;
    background:transparent;color:var(--text2);font-size:12.5px;font-family:'DM Sans',sans-serif;
    width:100%;resize:none;min-height:22px;transition:border-color .15s,background .15s;outline:none;}
  .editable:hover{border-color:var(--border);background:var(--surface2);}
  .editable:focus{border-color:var(--accent);background:var(--surface2);color:var(--text);}
  .editable::placeholder{color:var(--text3);font-style:italic;}

  /* NOTES PANEL */
  .notes-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .notes-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:11px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .notes-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;
    line-height:1.6;resize:vertical;outline:none;min-height:80px;transition:border-color .15s;}
  .notes-textarea:focus{border-color:var(--accent);color:var(--text);}
  .notes-textarea::placeholder{color:var(--text3);font-style:italic;}
  .notes-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px;flex-wrap:wrap;}
  .notes-timestamp{font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace;}
  .saved-flash{font-size:10.5px;color:var(--green);font-family:'DM Mono',monospace;opacity:0;transition:opacity .3s;}
  .saved-flash.show{opacity:1;}

  /* GOALS */
  .goals-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .goals-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:11px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .goal-list{list-style:none;}
  .goal-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
  .goal-item:last-child{border-bottom:none;padding-bottom:0;}
  .goal-check{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;
    margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .goal-check.checked{background:var(--green);border-color:var(--green);}
  .goal-check.checked::after{content:'✓';color:white;font-size:9px;font-weight:700;}
  .goal-text{flex:1;background:transparent;border:none;outline:none;color:var(--text2);
    font-size:13px;font-family:'DM Sans',sans-serif;padding:0;line-height:1.5;}
  .goal-text:focus{color:var(--text);}
  .goal-text.done{text-decoration:line-through;color:var(--text3);}
  .goal-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px;opacity:0;transition:opacity .15s;}
  .goal-item:hover .goal-del{opacity:1;}
  .goal-del:hover{color:var(--red);}
  .add-btn{display:flex;align-items:center;gap:6px;margin-top:9px;padding:5px 10px;background:var(--surface2);
    border:1px dashed var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:11.5px;
    cursor:pointer;transition:all .15s;width:100%;}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* BAD SAT */
  .badsat-panel{background:var(--surface);border:1px solid rgba(242,92,92,.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .badsat-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:11px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .badsat-cols{display:flex;gap:6px;align-items:center;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:2px;}
  .badsat-cols span{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
  .badsat-list{list-style:none;margin-bottom:9px;}
  .badsat-item{display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);}
  .badsat-item:last-child{border-bottom:none;}
  .bs-url{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11.5px;padding:4px 8px;font-family:'DM Mono',monospace;outline:none;min-width:0;}
  .bs-url:focus{border-color:var(--accent);}
  .bs-date{width:118px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11px;padding:4px 7px;font-family:'DM Mono',monospace;outline:none;}
  .bs-date:focus{border-color:var(--accent);}
  .bs-note{width:195px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11.5px;padding:4px 8px;font-family:'DM Sans',sans-serif;outline:none;
    resize:none;min-height:30px;line-height:1.5;overflow:hidden;word-break:break-word;}
  .bs-note:focus{border-color:var(--accent);}
  .bs-open{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;padding:2px 3px;flex-shrink:0;}
  .bs-open:hover{color:var(--text);}
  .bs-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 3px;flex-shrink:0;}
  .bs-del:hover{color:var(--red);}

  /* COACHING LIST & OO LIST */
  .clist-panel{background:var(--surface);border:1px solid rgba(124,93,249,.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .clist-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:11px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .clist-cols{display:flex;gap:6px;align-items:center;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:2px;}
  .clist-cols span{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
  .clist-list{list-style:none;margin-bottom:9px;}
  .clist-item{display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);}
  .clist-item:last-child{border-bottom:none;}
  .clist-status{width:120px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11px;padding:4px 7px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
  .clist-status:focus{border-color:var(--accent);}
  .clist-date{width:118px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11px;padding:4px 7px;font-family:'DM Mono',monospace;outline:none;}
  .clist-date:focus{border-color:var(--accent);}
  .clist-note{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11.5px;padding:4px 8px;font-family:'DM Sans',sans-serif;outline:none;
    resize:none;min-height:30px;line-height:1.5;min-width:0;}
  .clist-note:focus{border-color:var(--accent);}
  .clist-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 3px;flex-shrink:0;margin-top:3px;}
  .clist-del:hover{color:var(--red);}
  .clist-entry-num{width:20px;flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-align:right;padding-top:6px;}

  .oolist-panel{background:var(--surface);border:1px solid rgba(45,217,138,.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .oolist-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:11px;color:var(--text);display:flex;align-items:center;gap:7px;}
  /* UPLOAD */
  .upload-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .upload-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;
    cursor:pointer;transition:all .2s;margin-bottom:12px;}
  .drop-zone:hover,.drop-zone.dov{border-color:var(--accent);background:rgba(79,142,247,.04);}
  .dz-icon{font-size:26px;margin-bottom:7px;}
  .dz-label{font-size:12.5px;color:var(--text3);margin-bottom:3px;}
  .dz-sub{font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace;}
  .drop-zone input[type=file]{display:none;}
  .doc-list{list-style:none;}
  .doc-item{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--surface2);
    border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;}
  .doc-icon-el{font-size:17px;flex-shrink:0;}
  .doc-info{flex:1;min-width:0;overflow:hidden;}
  .doc-name{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .doc-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
  .doc-dl{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;padding:2px 4px;flex-shrink:0;}
  .doc-dl:hover{color:var(--text);}
  .doc-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px;flex-shrink:0;}
  .doc-rm:hover{color:var(--red);}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);
    font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
  .btn-save{background:rgba(45,217,138,.14);color:var(--green);border:1px solid rgba(45,217,138,.28);}
  .btn-save:hover{background:rgba(45,217,138,.24);}

  /* SCORE COLORS */
  .sc-ex{color:var(--green);} .sc-gd{color:var(--accent);} .sc-nw{color:var(--yellow);} .sc-ar{color:var(--red);}

  /* COLOR BAR */
  .color-bar{height:5px;background:linear-gradient(90deg,var(--red) 0%,var(--yellow) 50%,var(--green) 100%);
    border-radius:2px;margin:12px 0 5px;position:relative;}
  .cb-marker{position:absolute;top:-4px;width:12px;height:12px;background:white;border-radius:50%;
    transform:translateX(-50%);box-shadow:0 0 0 2px var(--bg);}

  /* TOAST */
  #toast{position:fixed;bottom:18px;right:20px;background:var(--green);color:#0a1f10;padding:7px 16px;
    border-radius:20px;font-size:11.5px;font-weight:600;font-family:'DM Mono',monospace;
    opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;z-index:999;}
  #toast.show{opacity:1;transform:translateY(0);}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .oo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .oo-card h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:9px;font-weight:600;}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--text3);}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);}
  @media(max-width:880px){.sidebar{width:215px;min-width:215px;}.page{padding:18px;}.two-col{grid-template-columns:1fr;}}

  /* ── AGENT TAB BAR ── */
  .agent-tabs{display:flex;gap:4px;padding:10px 0 16px;flex-wrap:wrap;}
  .agent-tab{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;
    background:var(--surface2);border:1px solid var(--border);
    cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text2);
    transition:all .15s;user-select:none;white-space:nowrap;}
  .agent-tab:hover{background:var(--surface3);color:var(--text);}
  .agent-tab.active{background:var(--surface3);color:var(--text);border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(79,142,247,.2);}
  .tidio-overview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
  .tidio-overview-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
    background:linear-gradient(135deg,rgba(124,93,249,.12),rgba(79,142,247,.08));border-bottom:1px solid var(--border);}
  .tidio-tag{background:rgba(124,93,249,.18);color:var(--accent2);font-family:'DM Mono',monospace;
    font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.5px;}

  .tidio-agent-row{display:grid;grid-template-columns:180px 70px 70px 70px 90px 90px 100px 44px;
    gap:0;align-items:center;border-bottom:1px solid var(--border);transition:background .12s;}
  .tidio-agent-row:hover{background:var(--surface2);}
  .tidio-agent-row:last-child{border-bottom:none;}
  .tidio-agent-row > div{padding:9px 12px;font-size:12.5px;}
  .tidio-head{background:var(--surface2);display:grid;
    grid-template-columns:180px 70px 70px 70px 90px 90px 100px 44px;}
  .tidio-head > div{padding:8px 12px;font-size:10px;font-weight:600;color:var(--text3);
    text-transform:uppercase;letter-spacing:.7px;}

  .sat-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
    font-family:'DM Mono',monospace;font-size:11px;font-weight:600;}
  .sat-1{background:rgba(242,92,92,.15);color:var(--red);}
  .sat-2{background:rgba(248,123,62,.15);color:#f87b3e;}
  .sat-3{background:rgba(245,200,66,.15);color:var(--yellow);}
  .sat-4{background:rgba(79,142,247,.15);color:var(--accent);}
  .sat-5{background:rgba(45,217,138,.15);color:var(--green);}

  .poor-sat-list{list-style:none;}
  .poor-sat-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:12px 14px;margin-bottom:8px;transition:border-color .15s;}
  .poor-sat-entry:hover{border-color:rgba(242,92,92,.4);}
  .poor-sat-entry.sat-1-border{border-left:3px solid var(--red);}
  .poor-sat-entry.sat-2-border{border-left:3px solid #f87b3e;}
  .poor-sat-entry.sat-3-border{border-left:3px solid var(--yellow);}
  .poor-entry-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .poor-entry-dt{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text3);}
  .poor-entry-agent{font-size:12px;font-weight:600;color:var(--text);}
  .poor-entry-comment{font-size:12.5px;color:var(--text2);line-height:1.5;margin-bottom:6px;}
  .poor-entry-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--accent);
    font-family:'DM Mono',monospace;text-decoration:none;transition:color .15s;}
  .poor-entry-link:hover{color:var(--text);}

  .tidio-bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;padding:8px 0 0;margin-bottom:4px;}
  .tidio-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;}
  .tidio-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease;}
  .tidio-bar-lbl{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px;
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .tidio-bar-val{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px;}

  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    padding:3px 11px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:'DM Mono',monospace;}
  .filter-chip:hover{border-color:var(--accent2);color:var(--accent2);}
  .filter-chip.on{background:rgba(124,93,249,.12);border-color:var(--accent2);color:var(--accent2);}
  .filter-chip.on-red{background:rgba(242,92,92,.12);border-color:var(--red);color:var(--red);}

  /* ── INLINE TIDIO STRIP (on agent cards) ── */
  .rank-sort-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    font-size:10px;padding:3px 10px;color:var(--text3);cursor:pointer;font-family:'DM Mono',monospace;
    transition:all .15s;white-space:nowrap;}
  .rank-sort-btn:hover{border-color:var(--accent);color:var(--accent);}
  .rank-sort-btn.active{background:rgba(79,142,247,.14);border-color:var(--accent);color:var(--accent);}
  .tc-strip{border-top:1px solid var(--border);background:rgba(124,93,249,.04);}
  .tc-strip.has-poor{background:rgba(242,92,92,.04);border-top:1px solid rgba(242,92,92,.2);}
  .tc-strip-header{display:flex;align-items:center;justify-content:space-between;padding:8px 15px;cursor:default;}
  .tc-strip.has-poor .tc-strip-header{cursor:pointer;}
  .tc-strip.has-poor .tc-strip-header:hover{background:rgba(242,92,92,.06);}
  .tc-poor-badge{background:rgba(242,92,92,.14);color:var(--red);font-family:'DM Mono',monospace;
    font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
  .tc-ok-badge{background:rgba(45,217,138,.1);color:var(--green);font-family:'DM Mono',monospace;
    font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
  .tc-expand-caret{font-size:10px;color:var(--accent2);font-family:'DM Mono',monospace;transition:transform .18s;}
  .tc-expand-caret.open{transform:rotate(180deg);display:inline-block;}
  .tc-poor-list{border-top:1px solid rgba(242,92,92,.15);padding:8px 12px;display:flex;flex-direction:column;gap:7px;}
  .tc-poor-entry{background:var(--surface2);border-radius:var(--radius-sm);padding:9px 11px;border-left:3px solid var(--border);}
  .tc-poor-entry.sat-1-border{border-left-color:var(--red);}
  .tc-poor-entry.sat-2-border{border-left-color:#f87b3e;}
  .tc-poor-entry.sat-3-border{border-left-color:var(--yellow);}
  .tc-poor-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
  .tc-poor-comment{font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:5px;}
  .tc-poor-link{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;text-decoration:none;}
  .tc-poor-link:hover{color:var(--text);}

  /* ── RANKING TABLE WITH TIDIO EXPAND ── */
  .rank-agent-row{cursor:pointer;transition:background .12s;}
  .rank-agent-row:hover td{background:rgba(79,142,247,.05)!important;}
  .rank-tidio-row{display:none;}
  .rank-tidio-row.open{display:table-row;}
  .rank-tidio-cell{padding:0!important;border-top:none!important;background:rgba(124,93,249,.03)!important;}
  .rank-tidio-inner{padding:10px 40px 10px 56px;display:flex;flex-direction:column;gap:6px;border-top:1px solid rgba(124,93,249,.15);}
  .rank-tidio-summary{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .rank-poor-chat{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 11px;
    border-left:3px solid var(--border);display:flex;flex-direction:column;gap:4px;}
  .rank-poor-chat.sat-1-border{border-left-color:var(--red);}
  .rank-poor-chat.sat-2-border{border-left-color:#f87b3e;}
  .rank-poor-chat.sat-3-border{border-left-color:var(--yellow);}
  .rank-expand-btn{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:auto;
    background:none;border:none;cursor:pointer;padding:0;transition:color .15s;}
  .rank-expand-btn:hover{color:var(--accent2);}

  /* ── TIDIO AGENT PAGE ── (keep existing but tighten) */
  .tidio-agent-panel{background:var(--surface);border:1px solid rgba(124,93,249,.3);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:16px;}
  .tidio-agent-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:14px;color:var(--text);
    display:flex;align-items:center;gap:7px;}
  .tidio-mini-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
  .tidio-mini-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:9px 10px;text-align:center;}
  .tidio-mini-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--text);}
  .tidio-mini-lbl{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}
  .storyline-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
  .storyline-panel h3{font-family:'Fraunces',serif;font-size:13.5px;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:7px;}
  .story-add-row{display:grid;grid-template-columns:130px 160px 1fr auto;gap:8px;align-items:start;margin-bottom:14px;
    padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .story-add-row label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;
    display:block;margin-bottom:4px;font-weight:600;}
  .story-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:12.5px;padding:5px 9px;font-family:'DM Sans',sans-serif;outline:none;}
  .story-input:focus{border-color:var(--accent);color:var(--text);}
  .story-input.mono{font-family:'DM Mono',monospace;font-size:11.5px;}
  .story-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:12.5px;padding:5px 9px;font-family:'DM Sans',sans-serif;outline:none;
    resize:none;min-height:60px;line-height:1.5;}
  .story-textarea:focus{border-color:var(--accent);color:var(--text);}
  .story-add-btn{margin-top:18px;background:var(--accent);border:none;border-radius:6px;color:white;
    font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
  .story-add-btn:hover{background:#3a7ee8;}

  .story-tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .story-tag-filter{background:var(--surface2);border:1px solid var(--border);border-radius:20px;
    padding:3px 10px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:'DM Mono',monospace;}
  .story-tag-filter:hover,.story-tag-filter.on{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.1);}

  .story-timeline{list-style:none;position:relative;padding-left:22px;}
  .story-timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;
    width:1px;background:var(--border);}
  .story-entry{position:relative;margin-bottom:0;}
  .story-entry::before{content:'';position:absolute;left:-18px;top:14px;
    width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);flex-shrink:0;}
  .story-entry.trend-poor::before{background:var(--red);}
  .story-entry.trend-concern::before{background:var(--yellow);}
  .story-entry.trend-positive::before{background:var(--green);}
  .story-entry.trend-neutral::before{background:var(--text3);}
  .story-entry.trend-coaching::before{background:var(--accent2);}

  .story-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:11px 13px;margin-bottom:10px;transition:border-color .15s;}
  .story-card:hover{border-color:var(--border);border-color:rgba(79,142,247,.3);}
  .story-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .story-date{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text3);}
  .story-category{padding:2px 8px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;font-weight:600;}
  .cat-poor{background:rgba(242,92,92,.15);color:var(--red);}
  .cat-concern{background:rgba(245,200,66,.15);color:var(--yellow);}
  .cat-positive{background:rgba(45,217,138,.15);color:var(--green);}
  .cat-coaching{background:rgba(124,93,249,.15);color:var(--accent2);}
  .cat-neutral{background:var(--surface3);color:var(--text3);}
  .cat-pattern{background:rgba(79,142,247,.15);color:var(--accent);}
  .story-author{font-size:10.5px;color:var(--text3);margin-left:auto;}
  .story-body{font-size:13px;color:var(--text2);line-height:1.55;}
  .story-trend{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);
    margin-top:5px;font-family:'DM Mono',monospace;}
  .story-del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;
    padding:1px 3px;opacity:0;transition:opacity .15s;margin-left:4px;}
  .story-card:hover .story-del-btn{opacity:1;}
  .story-del-btn:hover{color:var(--red);}
  .story-edit-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;
    padding:1px 4px;opacity:0;transition:opacity .15s;}
  .story-card:hover .story-edit-btn{opacity:1;}
  .story-edit-btn:hover{color:var(--accent);}
  .story-edit-mode .story-body-view{display:none;}
  .story-edit-mode .story-edit-fields{display:flex!important;}
  .story-edit-fields{display:none;flex-direction:column;gap:7px;margin-top:2px;}
  .story-edit-textarea{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:6px;
    color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;padding:7px 9px;
    resize:vertical;min-height:70px;line-height:1.55;outline:none;}
  .story-edit-date{background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11px;padding:4px 8px;font-family:'DM Mono',monospace;outline:none;}
  .story-edit-date:focus{border-color:var(--accent);}
  .story-edit-actions{display:flex;align-items:center;gap:6px;margin-top:2px;}
  .story-save-btn{background:rgba(45,217,138,.14);border:1px solid rgba(45,217,138,.3);border-radius:6px;
    color:var(--green);font-size:11px;font-weight:600;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .story-save-btn:hover{background:rgba(45,217,138,.25);}
  .story-cancel-btn{background:var(--surface3);border:none;border-radius:6px;
    color:var(--text3);font-size:11px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .story-cancel-btn:hover{color:var(--text);}
  .story-empty{text-align:center;padding:22px;color:var(--text3);font-size:12px;}

  /* ── CSAT HISTORY MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
    display:flex;align-items:center;justify-content:center;opacity:0;
    transition:opacity .2s;pointer-events:none;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    width:min(780px,95vw);max-height:85vh;display:flex;flex-direction:column;
    transform:scale(.96) translateY(8px);transition:transform .2s;overflow:hidden;}
  .modal-overlay.open .modal-box{transform:scale(1) translateY(0);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
    border-bottom:1px solid var(--border);flex-shrink:0;}
  .modal-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--text);}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px 6px;line-height:1;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:18px 20px;overflow-y:auto;flex:1;}

  .csat-add-row{display:grid;grid-template-columns:120px 1fr 1fr auto;gap:8px;align-items:end;
    padding:12px 14px;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);margin-bottom:16px;}
  .csat-add-row label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;
    display:block;margin-bottom:4px;font-weight:600;}
  .csat-add-btn{background:var(--accent);border:none;border-radius:6px;color:white;
    font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .csat-add-btn:hover{background:#3a7ee8;}

  .csat-chart{margin-bottom:18px;}
  .chart-canvas-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;height:180px;position:relative;}

  .csat-history-list{list-style:none;}
  .csat-entry{display:grid;grid-template-columns:110px 90px 1fr auto;gap:10px;align-items:center;
    padding:9px 11px;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius-sm);margin-bottom:6px;}
  .csat-score{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;}
  .csat-score.pass{color:var(--green);}
  .csat-score.fail{color:var(--red);}
  .csat-date-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
  .csat-note{font-size:12.5px;color:var(--text2);}
  .csat-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s;}
  .csat-entry:hover .csat-del{opacity:1;}
  .csat-del:hover{color:var(--red);}

  /* spark bar */
  .spark-wrap{display:flex;align-items:flex-end;gap:3px;height:100%;width:100%;}
  .spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s ease;}
  .spark-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;
    text-align:center;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spark-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;}

  .csat-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .csat-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 12px;text-align:center;}
  .csat-stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text);}
  .csat-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;}

  /* ── WEEK SELECTOR BAR ── */
  .week-sel-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;
    border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(79,142,247,.07),rgba(124,93,249,.05));}
  .week-sel-icon{font-size:12px;flex-shrink:0;}
  .week-sel-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;flex-shrink:0;}
  .week-sel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-size:11px;padding:4px 8px;font-family:'DM Mono',monospace;outline:none;cursor:pointer;min-width:0;}
  .week-sel:focus{border-color:var(--accent);}
  .week-active-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── IMPORT PAGE ── */
  .import-upload-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;}
  .import-fields-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .import-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;
    display:block;margin-bottom:5px;font-weight:600;}
  .import-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;
    cursor:pointer;transition:all .2s;margin-bottom:0;}
  .import-drop:hover,.import-drop.dov{border-color:var(--accent);background:rgba(79,142,247,.04);}
  .import-drop input{display:none;}

  /* 3-zone import cards */
  .import-zones{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;min-width:0;}
  @media(max-width:880px){.import-zones{grid-template-columns:1fr;}}
  .import-zone-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s;}
  .import-zone-card.loaded{border-color:rgba(45,217,138,.35);}
  .import-zone-card.has-warn{border-color:rgba(245,200,66,.35);}
  .import-zone-header{display:flex;align-items:center;gap:8px;}
  .import-zone-icon{font-size:18px;flex-shrink:0;}
  .import-zone-title{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:var(--text);}
  .import-zone-sub{font-size:10.5px;color:var(--text3);line-height:1.4;}
  .import-zone-drop{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:14px 10px;
    text-align:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--text3);}
  .import-zone-drop:hover,.import-zone-drop.dov{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.04);}
  .import-zone-drop input{display:none;}
  .import-zone-loaded{background:rgba(45,217,138,.08);border:1px solid rgba(45,217,138,.25);border-radius:var(--radius-sm);
    padding:8px 10px;display:flex;align-items:center;gap:7px;}
  .import-zone-loaded-name{flex:1;font-size:11.5px;color:var(--green);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .import-zone-clear{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:1px 3px;flex-shrink:0;}
  .import-zone-clear:hover{color:var(--red);}
  .import-zone-warn{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);border-radius:var(--radius-sm);
    padding:6px 10px;font-size:11px;color:var(--yellow);}
  .import-zone-warn ul{list-style:none;margin-top:4px;}
  .import-zone-warn li::before{content:'⚠ ';font-size:10px;}

  /* CSV bad sat section in CSAT modal */
  .csv-badsat-section{margin-bottom:18px;}
  .csv-badsat-header{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
    font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .csv-badsat-entry{display:flex;align-items:center;gap:8px;padding:7px 10px;
    background:rgba(242,92,92,.06);border:1px solid rgba(242,92,92,.2);
    border-radius:var(--radius-sm);margin-bottom:5px;}
  .csv-badsat-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);flex-shrink:0;}
  .csv-badsat-date{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text3);flex-shrink:0;}
  .csv-badsat-link{font-size:11px;color:var(--accent);text-decoration:none;font-family:'DM Mono',monospace;margin-left:auto;flex-shrink:0;}
  .csv-badsat-link:hover{color:var(--text);}

  .weeks-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .week-entry{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 16px;transition:border-color .15s;}
  .week-entry:hover{border-color:var(--accent);}
  .week-entry.active-week{border-color:var(--accent);background:rgba(79,142,247,.06);}
  .week-entry-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
  .week-entry-badge{background:rgba(79,142,247,.14);color:var(--accent);border:1px solid rgba(79,142,247,.25);
    padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap;}
  .week-entry-badge.active{background:rgba(45,217,138,.14);color:var(--green);border-color:rgba(45,217,138,.25);}
  .week-entry-info{flex:1;min-width:0;}
  .week-entry-file{font-size:12.5px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .week-entry-meta{font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
  .week-entry-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .btn-week-act{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text2);font-size:11px;padding:4px 9px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-week-act:hover{border-color:var(--accent);color:var(--accent);}
  .btn-week-act.viewing{background:rgba(45,217,138,.12);border-color:rgba(45,217,138,.3);color:var(--green);}

    color:var(--text3);font-size:13px;padding:4px 7px;cursor:pointer;transition:all .15s;}

  .import-match-icon{font-size:12px;width:18px;text-align:center;flex-shrink:0;}

  .import-confirm-btn:hover{background:#24c278;}

    color:var(--text2);font-size:12px;padding:8px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:6px;}

  /* ── QUALITY GAUGE (precision arc) ── */
  .quality-gauge-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .quality-gauge-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);

  .quality-gauge-goal{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;}
  .quality-gauge-status{font-size:10px;margin-top:3px;font-weight:600;}

  .wk-label{flex:1;text-align:center;font-size:8.5px;color:var(--text3);font-family:'DM Mono',monospace;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

  .rename-input{background:var(--bg);border:1px solid var(--accent);border-radius:6px;

</style>
</head>

function computeAgentDataFromWeek(weekData){
  const result={};
  // Seed all supervisors from hardcoded
  for(const sup of Object.keys(HARDCODED_AGENT_DATA)) result[sup]={};
  // Fill from CSV agent rows
  for(const[agentName,raw]of Object.entries(weekData.agents)){
    const sup=AGENT_SUPERVISOR_MAP[agentName];
    if(!sup)continue;
    result[sup][agentName]=computeAgentKpis(raw);
  }
  // Remove empty supervisors
  for(const sup of Object.keys(result))
    if(Object.keys(result[sup]).length===0)delete result[sup];
  return result;
}

function computeAgentKpis(raw){
  const surveys=parseInt(raw.surveys)||0;

  // ── ZD CSAT ──
  // NULL string, blank, or zero surveys → no surveys received → award full 100%
  const zdRaw=raw.zdCsat;
  const zdNoSurveys=!zdRaw||zdRaw.toUpperCase()==='NULL'||zdRaw===''||surveys===0;
  const zdPct=zdNoSurveys?100:(parseFloat(zdRaw)||0)*100;
  const zdNaSurveys=zdNoSurveys; // flag to show "N/A" label

  // ── Tidio CSAT ──
  // NULL string or blank → no Tidio surveys → award full 100%
  const tiRaw=raw.tidioCsat;
  const tiNoSurveys=!tiRaw||tiRaw.toUpperCase()==='NULL'||tiRaw==='';
  const tiPct=tiNoSurveys?100:parseFloat(tiRaw)*100;

  const prodPct=(parseFloat(raw.productivity)||0)*100;
  const iph=parseFloat(raw.iph)||0;
  const otrPct=(parseFloat(raw.otr)||0)*100;

  // Scoring
  function zdScore(p){return p>=95?0.75:p>=90?0.63:p>=85?0.50:p>=75?0.25:0;}
  const zdPts=zdScore(zdPct);
  const tiPts=zdScore(tiPct);
  const prodPts=parseFloat(Math.min((prodPct/105)*1.5,1.5).toFixed(2));
  const iphPts=parseFloat(Math.min(iph/6,1.0).toFixed(2));
  const otrPts=parseFloat(Math.min(otrPct/60,1.0).toFixed(2));
  const total=parseFloat((zdPts+tiPts+prodPts+iphPts+otrPts).toFixed(2));

  // Display labels: show "N/A — 100%" so it's clear why full pts were awarded
  const zdLabel=zdNaSurveys?'N/A (100%)':zdPct.toFixed(1)+'%';
  const tiLabel=tiNoSurveys?'N/A (100%)':tiPct.toFixed(1)+'%';

  return{
    total,
    kpis:{
      'ZD Sat':{result:zdLabel,goal:'95%',pts:zdPts,max:0.75,noSurveys:zdNaSurveys},
      'Tidio Sat':{result:tiLabel,goal:'90%',pts:tiPts,max:0.75,noSurveys:tiNoSurveys},
      'Productivity':{result:prodPct.toFixed(1)+'%',goal:'105%',pts:prodPts,max:1.50},
      'One-Touch':{result:otrPct.toFixed(1)+'%',goal:'60%',pts:otrPts,max:1.00},
      'IPH':{result:iph.toFixed(1),goal:'6.0',pts:iphPts,max:1.00}
    },
    raw:{...raw,surveys,zdPct,tiPct,prodPct,iph,otrPct,zdNoSurveys,tiNoSurveys}
  };
}

/* ─── AGENT FUZZY MATCHER ─── */
function fuzzyMatchAgent(shortName){
  if(!shortName)return null;
  const s=shortName.trim().replace(/[''']/g,'').trim();
  const sl_=s.toLowerCase();

  // 1. Exact match in TIDIO_AGENT_MAP
  for(const[k,v]of Object.entries(TIDIO_AGENT_MAP)){
    if(k.toLowerCase()===sl_)return v;
  }
  // 2. Partial prefix match in TIDIO_AGENT_MAP (e.g. "Blanca" → "Blanca B")
  for(const[k,v]of Object.entries(TIDIO_AGENT_MAP)){
    if(k.toLowerCase().startsWith(sl_+' ')||sl_.startsWith(k.toLowerCase().split(' ')[0]+' ')){
      // check first token matches
      const kFirst=k.toLowerCase().split(' ')[0];
      const sFirst=sl_.split(' ')[0];
      if(kFirst===sFirst) return v;
    }
  }
  // 3. Direct full-name first-word match
  const allAgents=Object.keys(AGENT_SUPERVISOR_MAP);
  const sTokens=sl_.split(/\s+/);
  const sFirst=sTokens[0];
  const candidates=allAgents.filter(n=>n.toLowerCase().split(' ')[0]===sFirst);
  if(candidates.length===1)return candidates[0];
  if(candidates.length>1&&sTokens.length>1){
    // Use second token to disambiguate — match against any word of full name
    const sSecond=sTokens[1];
    for(const c of candidates){
      const words=c.toLowerCase().split(' ');
      if(words.some(w=>w.startsWith(sSecond)))return c;
    }
  }
  return null;
}

/* ─── BAD SAT CSV PARSER (semicolon-delimited) ─── */
function parseBadSatCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return null;
  // semicolon delimiter, quoted fields
  const parseRow=line=>{
    const res=[];let f='',q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){q=!q;}
      else if(ch===';'&&!q){res.push(f.trim());f='';}
      else{f+=ch;}
    }
    res.push(f.trim());
    return res;
  };
  const headers=parseRow(lines[0]).map(h=>h.replace(/"/g,'').trim());
  const byAgent={};
  const unmatched=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=parseRow(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{row[h]=(vals[idx]||'').replace(/"/g,'').trim();});
    const ticketId=row['Ticket ID'];
    const assigneeShort=row['Assignee name'];
    const createdDate=row['Ticket created - Date'];
    const solvedDate=row['Ticket solved - Date'];
    if(!ticketId||!assigneeShort)continue;
    const fullName=fuzzyMatchAgent(assigneeShort);
    if(!fullName){
      if(!unmatched.includes(assigneeShort))unmatched.push(assigneeShort);
      continue;
    }
    if(!byAgent[fullName])byAgent[fullName]=[];
    byAgent[fullName].push({
      ticketId,
      url:`https://jiffyshirts.zendesk.com/agent/tickets/${ticketId}`,
      createdDate,
      solvedDate,
      assigneeShort
    });
  }
  return{byAgent,unmatched};
}

/* ─── TIDIO SURVEY CSV PARSER ─── */
function parseTidioSurveyCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return null;
  const headers=parseCSVLine(lines[0]).map(h=>h.replace(/"/g,'').trim());
  const byAgent={};
  const unmatched=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{row[h]=(vals[idx]||'').replace(/"/g,'').trim();});
    const satRaw=row['Satisfaction rate'];
    if(!satRaw||satRaw==='')continue; // skip unrated
    const sat=parseInt(satRaw);
    if(isNaN(sat))continue;
    const agentsRaw=row['Assigned agents']||'';
    const agentsList=agentsRaw.split(';').map(a=>a.trim()).filter(Boolean);
    for(const agShort of agentsList){
      const fullName=fuzzyMatchAgent(agShort)||TIDIO_AGENT_MAP[agShort]||null;
      if(!fullName){
        if(agShort&&!unmatched.includes(agShort))unmatched.push(agShort);
        continue;
      }
      if(!byAgent[fullName])byAgent[fullName]=[];
      byAgent[fullName].push({
        dt:row['Start date']||'',
        sat,
        comment:row['Satisfaction comment']||'',
        link:row['Conversation link']||'',
        frt:row['First response time']||'',
        duration:row['Conversation duration']||''
      });
    }
  }
  return{byAgent,unmatched};
}

/* ─── CSV PARSING ─── */
function parseCSVLine(line){
  const res=[];let f='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){q=!q;}
    else if(ch===','&&!q){res.push(f);f='';}
    else{f+=ch;}
  }
  res.push(f);
  return res;
}

function parsePerformanceCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return null;
  const headers=parseCSVLine(lines[0]).map(h=>h.trim().replace(/"/g,''));
  const agents={};
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{row[h]=(vals[idx]||'').trim().replace(/"/g,'');});
    const agentName=row['agent'];
    if(!agentName)continue;
    // Preserve raw string so NULL can be detected downstream
    agents[agentName]={
      zdCsat:row['ZD CSAT'],
      tidioCsat:row['Tidio CSAT'],
      productivity:row['Time Productivity']||'',
      iph:row['IPH']||'',
      otr:row['OTR %']||'',
      surveys:row['surveys']||'',
      interactions:row['interactions']||'',
      ticketsSolved:row['tickets_solved']||'',
      outboundCalls:row['outbound_calls']||'',
      liveConversations:row['live_conversations']||'',
      loggedHr:row['logged_hr']||'',
      productiveHr:row['productive_hr']||'',
      expectedHr:row['expected_hr']||''
    };
  }
  return agents;
}

function switchWeek(label){
  currentWeek=label;
  localStorage.setItem('cs_currentWeek',label);
  refreshAgentData();

  // Remember what page we're on right now
  const stayPage=curPage||'overview';

  // Remove all cached pages so they rebuild with fresh data
  document.querySelectorAll('.page').forEach(p=>p.remove());

  // Rebuild sidebar (updates week selector + dot colors)
  buildSidebar();

  // Rebuild and activate the page the user was already on
  mkPage(stayPage);
  document.getElementById('page-'+stayPage)?.classList.add('active');
  document.getElementById('nav-'+stayPage)?.classList.add('active');

  // If on an agent sub-page, keep the supervisor nav open too
  if(stayPage.startsWith('agent_')){
    const parts=stayPage.replace('agent_','');
    for(const sup of Object.keys(agentData)){
      const sid=sl(sup);
      for(const a of Object.keys(agentData[sup])){
        if(sl(sup)+'_'+sl(a)===parts){
          const sub=document.getElementById('sub-'+sid),chev=document.getElementById('chev-'+sid);
          if(sub&&!sub.classList.contains('open')){sub.classList.add('open');chev&&chev.classList.add('open');}
          document.getElementById('nav-sup_'+sid)?.classList.add('active');
        }
      }
    }
  }

  const lbl=label==='__hardcoded__'?'Default Week':label;
  toast(`📅 Switched to ${lbl}`);
}

function renameWeek(oldLabel){
  const newLabel=prompt('Enter new week label:',oldLabel);
  if(!newLabel||newLabel===oldLabel)return;
  if(weeklyPerf[newLabel]){alert('A week with that label already exists.');return;}
  weeklyPerf[newLabel]={...weeklyPerf[oldLabel],label:newLabel};
  delete weeklyPerf[oldLabel];
  saveWeeklyPerf();
  if(currentWeek===oldLabel){
    currentWeek=newLabel;
    localStorage.setItem('cs_currentWeek',newLabel);

  toast(`✓ Renamed to ${newLabel}`);

function _setPendingSlot(slot,data){

  refreshImportPage();
}
function _clearPendingSlot(slot){_pendingImport[slot]=null;refreshImportPage();}
function loadImportFile(file,slot){
  const r=new FileReader();
  r.onload=e=>{
    if(slot==='metrics'){
      const agents=parsePerformanceCSV(e.target.result);
      if(!agents||Object.keys(agents).length===0){toast('⚠ No agent data found in Metrics CSV');return;}
      const names=Object.keys(agents);
      const unmatched=names.filter(n=>!AGENT_SUPERVISOR_MAP[n]);
      _setPendingSlot('metrics',{agents,fileName:file.name,matched:names.length-unmatched.length,total:names.length,unmatched});
    } else if(slot==='badSat'){
      const result=parseBadSatCSV(e.target.result);
      if(!result){toast('⚠ Could not parse Bad Sat CSV');return;}
      const count=Object.values(result.byAgent).reduce((s,a)=>s+a.length,0);
      _setPendingSlot('badSat',{...result,fileName:file.name,count});
    } else if(slot==='tidio'){
      const result=parseTidioSurveyCSV(e.target.result);
      if(!result){toast('⚠ Could not parse Tidio CSV');return;}
      const total=Object.values(result.byAgent).reduce((s,a)=>s+a.length,0);
      const poor=Object.values(result.byAgent).reduce((s,a)=>s+a.filter(r=>r.sat<=3).length,0);
      _setPendingSlot('tidio',{...result,fileName:file.name,total,poor});
    }
  };
  r.readAsText(file);
}

function confirmImport(){
  const m=_pendingImport.metrics,bs=_pendingImport.badSat,ti=_pendingImport.tidio;
  if(!m&&!bs&&!ti){toast('⚠ No files staged');return;}
  const labelInput=document.getElementById('new-week-label');
  const fromInput=document.getElementById('new-week-from');
  const toInput=document.getElementById('new-week-to');
  let label=(labelInput?.value||'').trim();
  if(!label){
    const d=new Date();
    const wn=Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+1)/7);
    label=`W${wn} ${d.getFullYear()}`;
  }
  if(weeklyPerf[label]&&!confirm(`Week "${label}" already exists. Merge/replace it?`))return;
  const existing=weeklyPerf[label]||{};
  weeklyPerf[label]={
    ...existing,
    label,
    uploadedAt:new Date().toISOString(),
    dateFrom:fromInput?.value||existing.dateFrom||'',
    dateTo:toInput?.value||existing.dateTo||'',
    ...(m?{fileName:m.fileName,agents:m.agents}:{}),
    ...(bs?{badSatFileName:bs.fileName,badSat:bs.byAgent}:{}),
    ...(ti?{tidioFileName:ti.fileName,tidio:ti.byAgent}:{})
  };
  saveWeeklyPerf();
  _pendingImport={metrics:null,badSat:null,tidio:null};
  if(labelInput)labelInput.value='';
  if(fromInput)fromInput.value='';
  if(toInput)toInput.value='';
  toast(`✓ Week "${label}" saved`);
  switchWeek(label);
  refreshImportPage();
}

/* replace a single file slot on an already-saved week */
function replaceSlotFile(weekLabel,slot,input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const existing=weeklyPerf[weekLabel];
    if(!existing)return;
    if(slot==='metrics'){
      const agents=parsePerformanceCSV(e.target.result);
      if(!agents){toast('⚠ Could not parse Metrics CSV');return;}
      weeklyPerf[weekLabel]={...existing,fileName:file.name,agents};
    } else if(slot==='badSat'){
      const result=parseBadSatCSV(e.target.result);
      if(!result){toast('⚠ Could not parse Bad Sat CSV');return;}
      weeklyPerf[weekLabel]={...existing,badSatFileName:file.name,badSat:result.byAgent};
    } else if(slot==='tidio'){
      const result=parseTidioSurveyCSV(e.target.result);
      if(!result){toast('⚠ Could not parse Tidio CSV');return;}
      weeklyPerf[weekLabel]={...existing,tidioFileName:file.name,tidio:result.byAgent};
    }
    weeklyPerf[weekLabel].uploadedAt=new Date().toISOString();
    saveWeeklyPerf();
    if(currentWeek===weekLabel){
      refreshAgentData();
      switchWeek(weekLabel);
    }
    toast(`✓ ${weekLabel} — ${slot} updated`);
    refreshImportPage();
  };
  r.readAsText(file);
}

function fmtSecs(s){
  if(s===null||s===undefined) return '—';
  const m=Math.floor(s/60),sec=s%60;
  if(m>=60){const h=Math.floor(m/60);return`${h}h ${m%60}m`;}
  return`${m}m ${sec}s`;
}
function getTidioKey(agentDashName){
  return TIDIO_REV_MAP[agentDashName]||null;
}
function getTidioStats(agentDashName){
  const wk=weeklyPerf[currentWeek];

  // Total chats from metrics CSV (live_conversations column)
  let totalChats=null;
  if(wk?.agents?.[agentDashName]){
    const lc=wk.agents[agentDashName].liveConversations||wk.agents[agentDashName].live_conversations;
    if(lc!==undefined&&lc!==''&&lc!==null) totalChats=parseInt(lc)||0;
  }

  // Rated/poor/good from Tidio surveys CSV
  if(wk?.tidio?.[agentDashName]){
    const chats=wk.tidio[agentDashName];
    const rated=chats.length;
    const poor=chats.filter(c=>c.sat<=3).length;
    const good=chats.filter(c=>c.sat>=4).length;
    const sat_pct=rated>0?Math.round((good/rated)*100):null;
    // total = live_conversations from metrics if available, else rated count
    return{
      total:totalChats!==null?totalChats:rated,
      rated,poor,good,
      avg_frt:null,avg_dur:null,
      tidio_sat_pct:sat_pct
    };
  }

  // Metrics CSV only (no Tidio surveys CSV)
  if(totalChats!==null){
    return{total:totalChats,rated:0,poor:0,good:0,avg_frt:null,avg_dur:null,tidio_sat_pct:null};
  }

  // Fall back to hardcoded TIDIO_TOTALS
  const tk=getTidioKey(agentDashName);
  return tk&&TIDIO_TOTALS[tk]?TIDIO_TOTALS[tk]:null;
}
function getTidioPoor(agentDashName){
  // If current week has CSV Tidio data, use it
  const wk=weeklyPerf[currentWeek];
  if(wk?.tidio?.[agentDashName]){
    return wk.tidio[agentDashName].filter(c=>c.sat<=3);
  }
  const tk=getTidioKey(agentDashName);
  if(!tk) return [];
  return TIDIO_POOR.filter(p=>p.agent===tk);
}

try{S=JSON.parse(localStorage.getItem('csDash3')||'{}');}catch(e){}
const gs=(k,fb)=>S[k]!==undefined?S[k]:fb;
const ss=(k,v)=>{S[k]=v;try{localStorage.setItem('csDash3',JSON.stringify(S));}catch(e){}};

let _toastT;
function toast(m='✓ Saved'){
  const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

/* ─── HELPERS ─── */
const ini=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const sl=s=>s.replace(/[^a-z0-9]/gi,'_');
const sc=s=>s>=4.8?'sc-ex':s>=4.5?'sc-gd':s>=4.0?'sc-nw':'sc-ar';
function stag(s){
  if(s>=4.8)return'<span class="tag tag-green">Excellent</span>';
  if(s>=4.5)return'<span class="tag tag-blue">Good</span>';
  if(s>=4.0)return'<span class="tag tag-yellow">Needs Attention</span>';
  return'<span class="tag tag-red">At Risk</span>';
}
function bc(pts,max){const p=pts/max;return p>=.95?'green':p>=.67?'':p>=.4?'yellow':'red';}
// Returns CSS color for a CSAT KPI result — handles "N/A (100%)" as green
function csatCol(kd,goal){
  if(!kd)return'var(--red)';
  if(kd.noSurveys)return'var(--green)';
  const v=parseFloat(kd.result);
  return isNaN(v)?'var(--text3)':v>=(goal||90)?'var(--green)':'var(--red)';
}
function ring(score,sz=50){
  const r=18,c=sz/2,circ=2*Math.PI*r,dash=(score/5)*circ;
  let col='#2dd98a';if(score<4.8)col='#4f8ef7';if(score<4.0)col='#f5c842';if(score<3.5)col='#f25c5c';
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#232840" stroke-width="5"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}" stroke-linecap="round"/></svg>`;
}
const avg=sup=>{const v=Object.values(agentData[sup]).map(a=>a.total);return(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2);};
const fmtD=d=>d?new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';

  <div class="week-sel-bar">

    <span class="week-sel-label">Week</span>

  </div>
  <div class="nav-section"><div class="nav-label">Overview</div>
  <div class="nav-item" onclick="nav('overview')" id="nav-overview"><span class="nav-icon">📊</span>Team Overview</div>
  <div class="nav-item" onclick="nav('import')" id="nav-import"><span class="nav-icon">📥</span>Data Import</div>

  for(const sup of Object.keys(agentData)){
    const sid=sl(sup),cnt=Object.keys(agentData[sup]).length,open=gs('sb_'+sid,false);
    h+=`<div class="sup-nav-row" id="nav-sup_${sid}">
      <div class="sup-nav-main" onclick="nav('sup_${sid}')">
        <span class="nav-icon">👤</span><span style="flex:1">${sup.split(' ')[0]} ${sup.split(' ')[1]||''}</span>
        <span class="sup-badge">${cnt}</span>
      </div>
      <div class="sup-chevron${open?' open':''}" id="chev-${sid}" onclick="toggleSub('${sid}')">▾</div>
    </div>
    <div class="nav-sub${open?' open':''}" id="sub-${sid}">`;
    for(const a of Object.keys(agentData[sup])){
      const aid=sl(sup)+'_'+sl(a);
      const score=agentData[sup][a].total;
      const dotCol=score>=4.8?'var(--green)':score>=4.5?'var(--accent)':score>=4.0?'var(--yellow)':'var(--red)';
      h+=`<div class="nav-item" onclick="nav('agent_${aid}')" id="nav-agent_${aid}">

        </span>
        ${a.split(' ')[0]} ${(a.split(' ')[1]||'')[0]||''}.</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('sidebar').innerHTML=h;
}

function toggleSub(sid){
  const sub=document.getElementById('sub-'+sid),chev=document.getElementById('chev-'+sid);
  const o=sub.classList.contains('open');
  sub.classList.toggle('open',!o);chev.classList.toggle('open',!o);
  ss('sb_'+sid,!o);
}

/* ─── NAVIGATION ─── */
let curPage='overview';
function nav(pid){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item,.sup-nav-row').forEach(n=>n.classList.remove('active'));
  // Always rebuild import page fresh so week list is current
  if(pid==='import'){
    const ex=document.getElementById('page-import');
    if(ex)ex.remove();
  }
  if(!document.getElementById('page-'+pid)) mkPage(pid);
  document.getElementById('page-'+pid)?.classList.add('active');
  document.getElementById('nav-'+pid)?.classList.add('active');
  if(pid.startsWith('agent_')){
    const parts=pid.replace('agent_','');
    for(const sup of Object.keys(agentData)){
      const sid=sl(sup);
      for(const a of Object.keys(agentData[sup])){
        if(sl(sup)+'_'+sl(a)===parts){
          const sub=document.getElementById('sub-'+sid),chev=document.getElementById('chev-'+sid);
          if(sub&&!sub.classList.contains('open')){sub.classList.add('open');chev&&chev.classList.add('open');ss('sb_'+sid,true);}
          document.getElementById('nav-sup_'+sid)?.classList.add('active');
        }
      }
    }
  }
  curPage=pid;window.scrollTo(0,0);
}

function mkPage(pid){
  const d=document.createElement('div');d.className='page';d.id='page-'+pid;
  if(pid==='overview')d.innerHTML=mkOverview();
  else if(pid==='import')d.innerHTML=mkImport();
  else if(pid.startsWith('sup_')){
    const sup=Object.keys(agentData).find(s=>sl(s)===pid.replace('sup_',''));
    if(sup)d.innerHTML=mkSup(sup);
  }else if(pid.startsWith('agent_')){
    const parts=pid.replace('agent_','');
    let fs=null,fa=null;
    for(const s of Object.keys(agentData))for(const a of Object.keys(agentData[s]))
      if(sl(s)+'_'+sl(a)===parts){fs=s;fa=a;}
    if(fs)d.innerHTML=mkAgent(fs,fa);
  }
  document.getElementById('main-content').appendChild(d);
  autoGrow(d);
}

/* ─── AGENT CARD (with inline Tidio poor-sat) ─── */
function mkCard(sup,ag,data){
  const pid='agent_'+sl(sup)+'_'+sl(ag);
  const kRows=Object.entries(data.kpis).map(([k,kd])=>{
    const p=kd.pts/kd.max,c=bc(kd.pts,kd.max);
    const rawVal=parseFloat(kd.result)||0;
    const goalVal=k==='IPH'?6:k==='Productivity'?105:90;
    const goalPct=k==='IPH'?(goalVal/(Math.max(rawVal*1.3,goalVal*1.5)))*100:Math.min(goalVal,100);
    const fillPct=k==='IPH'?Math.min((rawVal/(Math.max(rawVal*1.3,goalVal*1.5)))*100,100):Math.min(rawVal,100);
    return`<div class="kpi-row"><div class="kpi-name">${k}</div>
      <div class="kpi-bar-wrap" style="position:relative">
        <div class="kpi-bar ${c}" style="width:${Math.round(fillPct)}%"></div>
        <div style="position:absolute;top:0;bottom:0;left:${goalPct}%;width:1px;background:rgba(245,200,66,.6);pointer-events:none"></div>
      </div>
      <div class="kpi-pct">${kd.result}</div></div>`;
  }).join('');

  // Raw CSV stats strip (only when using uploaded week)
  let rawStrip='';
  if(data.raw&&currentWeek!=='__hardcoded__'){
    const r=data.raw;
    rawStrip=`<div style="border-top:1px solid var(--border);padding:8px 15px;display:flex;flex-wrap:wrap;gap:10px;background:rgba(79,142,247,.03)">
      ${[
        ['Surveys',r.surveys||'—'],
        ['Interactions',r.interactions||'—'],
        ['Tickets',r.ticketsSolved||'—'],
        ['Calls',r.outboundCalls||'—'],
        ['Logged Hr',r.loggedHr?parseFloat(r.loggedHr).toFixed(1)+'h':'—']
      ].map(([lbl,val])=>`<div style="text-align:center;min-width:52px">
        <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--text)">${val}</div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px">${lbl}</div>
      </div>`).join('')}
    </div>`;
  }

  // Tidio inline section — always use getTidioStats so CSV data is picked up
  const tidioD=getTidioStats(ag);
  const poorChats=getTidioPoor(ag);
  const cardUid='tc_'+sl(sup)+'_'+sl(ag);

  let tidioStrip='';
  if(tidioD){
    const satCol=tidioD.tidio_sat_pct>=90?'var(--green)':tidioD.tidio_sat_pct>=75?'var(--yellow)':'var(--red)';
    const hasPoor=poorChats.length>0;

    const poorList=poorChats.map(p=>`
      <div class="tc-poor-entry sat-${p.sat}-border">
        <div class="tc-poor-header">
          <span class="sat-pill sat-${p.sat}">${satLabel(p.sat)}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${p.dt}</span>
        </div>
        ${p.comment?`<div class="tc-poor-comment">"${p.comment}"</div>`:'<div class="tc-poor-comment" style="color:var(--text3);font-style:italic">No comment left</div>'}
        <a class="tc-poor-link" href="${p.link}" target="_blank" onclick="event.stopPropagation()">🔗 Open in Tidio ↗</a>
      </div>`).join('');

    tidioStrip=`<div class="tc-strip ${hasPoor?'has-poor':''}">
      <div class="tc-strip-header" onclick="toggleTidioCard('${cardUid}',event)">
        <div style="display:flex;align-items:center;gap:8px">

function mkArcGauge(pct,sz,color){
  const r=sz/2-6,cx=sz/2,cy=sz/2;
  // Semi-arc: start at 210deg end at 330deg (240deg sweep)
  const startA=210*Math.PI/180,endA=330*Math.PI/180;
  const totalSweep=2*Math.PI-((330-210)*Math.PI/180); // 300deg sweep
  const sweep=totalSweep*Math.min(Math.max(pct,0),1);
  const arcStart={x:cx+r*Math.cos(startA),y:cy+r*Math.sin(startA)};
  const arcEnd={x:cx+r*Math.cos(startA+sweep),y:cy+r*Math.sin(startA+sweep)};
  const bgEnd={x:cx+r*Math.cos(endA),y:cy+r*Math.sin(endA)};
  const la=sweep>Math.PI?1:0;
  const bgLa=(totalSweep-sweep)>Math.PI?1:0;
  // Track path
  const trackEnd={x:cx+r*Math.cos(startA+totalSweep),y:cy+r*Math.sin(startA+totalSweep)};
  const trackLa=totalSweep>Math.PI?1:0;
  const trackPath=`M ${arcStart.x} ${arcStart.y} A ${r} ${r} 0 ${trackLa} 1 ${trackEnd.x} ${trackEnd.y}`;
  // Fill path
  const fillPath=sweep>0.01?`M ${arcStart.x} ${arcStart.y} A ${r} ${r} 0 ${la} 1 ${arcEnd.x} ${arcEnd.y}`:'';
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="overflow:visible">
    <path d="${trackPath}" fill="none" stroke="var(--surface3)" stroke-width="4.5" stroke-linecap="round"/>
    ${fillPath?`<path d="${fillPath}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round"/>`:''}
  </svg>`;
}

/* ─── WEEKLY TREND FOR AGENT ─── */
function buildAgentWeekHistory(agName,sup){
  const weeks=Object.entries(weeklyPerf).sort((a,b)=>a[1].uploadedAt.localeCompare(b[1].uploadedAt));
  const result=[];
  // Include hardcoded week
  const hdAgent=HARDCODED_AGENT_DATA[sup]?.[agName];
  if(hdAgent) result.push({label:'W202609',kpis:hdAgent.kpis,total:hdAgent.total,isDefault:true});
  // Include uploaded weeks
  for(const[label,wk]of weeks){
    const raw=wk.agents?.[agName];
    if(!raw)continue;
    const computed=computeAgentKpis(raw);
    result.push({label,kpis:computed.kpis,total:computed.total});
  }
  return result;
}

function mkAgentWeeklyTrend(agName,history){
  if(history.length<2)return'';
  const maxScore=5,minBar=4;
  const bars=history.map(wk=>{
    const v=wk.total;
    const hpct=Math.max(((v-minBar)/(maxScore-minBar))*100,3);
    const col=v>=4.8?'var(--green)':v>=4.5?'var(--accent)':v>=4.0?'var(--yellow)':'var(--red)';
    return`<div class="spark-col" style="min-width:36px">
      <div style="font-size:9px;color:var(--text3);margin-bottom:2px;font-family:'DM Mono',monospace">${v.toFixed(2)}</div>
      <div class="spark-bar" style="height:${Math.max(hpct,4)}%;background:${col}"></div>
      <div class="spark-label">${wk.label}</div>
    </div>`;
  }).join('');

  // KPI rows for each uploaded week
  const kpiNames=['ZD Sat','Tidio Sat','Productivity','One-Touch','IPH'];
  const kpiGoals={'ZD Sat':90,'Tidio Sat':90,'Productivity':105,'One-Touch':60};
  let kpiTrendRows='';
  for(const kpi of kpiNames){
    const rowBars=history.map(wk=>{
      const raw=parseFloat(wk.kpis?.[kpi]?.result)||0;
      const goal=kpiGoals[kpi]||6;
      const isIPH=kpi==='IPH';
      const pct=isIPH?Math.min((raw/12)*100,100):Math.min(raw,100);
      const met=raw>=goal;
      const col=met?'var(--green)':raw>=(goal*0.85)?'var(--yellow)':'var(--red)';
      return`<div style="flex:1;min-width:32px;text-align:center">
        <div style="font-size:9px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px">${wk.kpis?.[kpi]?.result||'—'}</div>
        <div style="height:5px;background:var(--surface3);border-radius:2px;position:relative">
          <div style="position:absolute;inset-y:0;left:0;width:${pct}%;background:${col};border-radius:2px"></div>
        </div>
      </div>`;
    }).join('');
    kpiTrendRows+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:82px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;flex-shrink:0">${kpi}</div>
      <div style="flex:1;display:flex;gap:4px">${rowBars}</div>
    </div>`;
  }

  return`<div class="section-header"><div class="section-title">📈 Weekly Performance Trend</div><span style="font-size:11px;color:var(--text3)">${history.length} weeks of data</span></div>
  <div class="notes-panel" style="padding:16px 18px;margin-bottom:16px">
    <div style="margin-bottom:10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Overall Score Trend</div>
    <div class="chart-canvas-wrap" style="height:130px;margin-bottom:16px">
      <div style="position:absolute;right:10px;top:8px;font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace">Max 5.00</div>
      <div class="spark-wrap" style="height:100%;align-items:flex-end;overflow-x:auto;gap:4px">${bars}</div>
    </div>
    <div style="margin-bottom:8px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600">KPI Trend — All Weeks</div>
    ${kpiTrendRows}
    <div style="display:flex;gap:3px;margin-top:4px">
      <div style="width:82px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;gap:4px">
        ${history.map(wk=>`<div style="flex:1;min-width:32px;text-align:center;font-size:8.5px;color:var(--text3);font-family:'DM Mono',monospace;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${wk.label}</div>`).join('')}
      </div>
