function mkCsatTrendChart(key,history){
  if(history.length<1)return'';
  const uid='csattrend_'+sl(key);

  // Build weeks array with ZD + Tidio CSAT values and a sortable date
  // label format e.g. "W202609" or "W10 2026" — use uploadedAt for ordering
  const allWeeks=[];
  // Hardcoded week
  const hdEntry=history.find(h=>h.isDefault);
  if(hdEntry){
    const zd=parseFloat(hdEntry.kpis?.['ZD Sat']?.result)||null;
    const ti=parseFloat(hdEntry.kpis?.['Tidio Sat']?.result)||null;
    allWeeks.push({label:hdEntry.label,zd,ti,dateStr:'2026-02-28',ts:0});
  }
  // Uploaded weeks
  const uploadedEntries=Object.entries(weeklyPerf).sort((a,b)=>a[1].uploadedAt.localeCompare(b[1].uploadedAt));
  for(const[label,wk]of uploadedEntries){
    // find matching history entry
    const h=history.find(x=>x.label===label);
    if(!h)continue;
    const zd=parseFloat(h.kpis?.['ZD Sat']?.result)||null;
    const ti=parseFloat(h.kpis?.['Tidio Sat']?.result)||null;
    // use dateFrom if available, else uploadedAt
    const dateStr=wk.dateFrom||wk.uploadedAt?.slice(0,10)||'';
    const ts=new Date(wk.uploadedAt||'2000-01-01').getTime();
    allWeeks.push({label,zd,ti,dateStr,ts});
  }

  if(allWeeks.length<1)return'';

  // Time range filter options (in weeks)
  const ranges=[{id:'1m',label:'1M',weeks:4},{id:'2m',label:'2M',weeks:8},{id:'3m',label:'3M',weeks:13},
    {id:'6m',label:'6M',weeks:26},{id:'1y',label:'1Y',weeks:52},{id:'all',label:'All',weeks:9999}];

  const rangeBtns=ranges.map((r,i)=>
    `<button id="${uid}_r_${r.id}" onclick="filterCsatTrend('${uid}',${r.weeks},this)"
      style="padding:3px 10px;border-radius:20px;border:1px solid ${i===0?'var(--accent)':'var(--border)'};
        background:${i===0?'rgba(79,142,247,.15)':'var(--surface2)'};
        color:${i===0?'var(--accent)':'var(--text3)'};font-size:10.5px;cursor:pointer;
        font-family:'DM Mono',monospace;transition:all .15s">${r.label}</button>`
  ).join('');

  // Store week data in a JS map keyed by uid so no encoding issues
  if(!window._csatTrendData)window._csatTrendData={};
  window._csatTrendData[uid]=allWeeks;

  return`<div class="section-header" style="margin-top:4px">
    <div class="section-title">📈 Performance Trends</div>
    <div style="display:flex;gap:4px">${rangeBtns}</div>
  </div>
  <div id="${uid}" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
    ${renderCsatTrendSvg(uid+'_zd','ZD CSAT Trend',allWeeks,'zd',95)}
    ${renderCsatTrendSvg(uid+'_ti','Tidio CSAT Trend',allWeeks,'ti',90)}
  </div>`;
}

function filterCsatTrend(uid,weeks,btn){
  const container=document.getElementById(uid);
  if(!container)return;

  // Update button styles — buttons are siblings inside the section-header, search from grandparent
  const root=container.parentElement||document;
  root.querySelectorAll('[id^="'+uid+'_r_"]').forEach(b=>{
    b.style.background='var(--surface2)';b.style.color='var(--text3)';b.style.borderColor='var(--border)';
  });
  btn.style.background='rgba(79,142,247,.15)';btn.style.color='var(--accent)';btn.style.borderColor='var(--accent)';

  // Read data from JS store
  const allWeeks=(window._csatTrendData&&window._csatTrendData[uid])||[];

  // Filter by actual date range (days from most recent point)
  let filtered=allWeeks;
  if(weeks<9999&&allWeeks.length>0){
    const maxDays=weeks*7; // weeks → days
    // Find the most recent date string
    const sortedByDate=[...allWeeks].filter(w=>w.dateStr).sort((a,b)=>b.dateStr.localeCompare(a.dateStr));
    const newestDate=sortedByDate[0]?.dateStr;
    if(newestDate){
      const cutoff=new Date(newestDate);
      cutoff.setDate(cutoff.getDate()-maxDays);
      filtered=allWeeks.filter(w=>{
        if(!w.dateStr)return true; // keep undated entries
        return new Date(w.dateStr)>=cutoff;
      });
    }
  }

  container.innerHTML=
    renderCsatTrendSvg(uid+'_zd','ZD CSAT Trend',filtered,'zd',95)+
    renderCsatTrendSvg(uid+'_ti','Tidio CSAT Trend',filtered,'ti',90);
}

function renderCsatTrendSvg(elId,title,weeks,field,goal){
  const W=680,H=160,padL=48,padR=24,padT=20,padB=36;
  const plotW=W-padL-padR,plotH=H-padT-padB;

  const pts=weeks.filter(w=>w[field]!==null&&w[field]!==undefined);
  if(pts.length===0){
    return`<div id="${elId}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;color:var(--text3);font-size:12px">${title} — no data</div>`;
  }

  const vals=pts.map(p=>p[field]);
  const minV=Math.max(0,Math.min(...vals,goal)-10);
  const maxV=Math.min(100,Math.max(...vals,goal)+8);
  const yScale=v=>padT+plotH-(((v-minV)/(maxV-minV))*plotH);
  const xScale=i=>padL+(i/(Math.max(pts.length-1,1)))*plotW;

  // Y axis labels
  const yLabels=[minV,Math.round((minV+maxV)/2),maxV].map(v=>
    `<text x="${padL-6}" y="${yScale(v)+4}" text-anchor="end" fill="#5a6080" font-size="10" font-family="DM Mono,monospace">${Math.round(v)}%</text>`
  ).join('');

  // Goal dashed line
  const goalY=yScale(goal);
  const goalLine=`<line x1="${padL}" y1="${goalY}" x2="${padL+plotW}" y2="${goalY}" stroke="#f5c842" stroke-width="1.2" stroke-dasharray="5,4"/>
    <text x="${padL+plotW+4}" y="${goalY+4}" fill="#f5c842" font-size="10" font-family="DM Mono,monospace">Goal ${goal}%</text>`;

  // Area fill
  const linePoints=pts.map((p,i)=>`${xScale(i)},${yScale(p[field])}`).join(' ');
  const areaPoints=`${xScale(0)},${padT+plotH} ${linePoints} ${xScale(pts.length-1)},${padT+plotH}`;
  const areaFill=`<polygon points="${areaPoints}" fill="rgba(79,142,247,.1)"/>`;

  // Line
  const polyline=`<polyline points="${linePoints}" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Data points
  const circles=pts.map((p,i)=>{
    const col=p[field]>=goal?'var(--green)':'#f25c5c';
    return`<circle cx="${xScale(i)}" cy="${yScale(p[field])}" r="4" fill="${col}" stroke="var(--surface)" stroke-width="1.5">
      <title>${p.label}: ${p[field]}%</title></circle>
      <text x="${xScale(i)}" y="${yScale(p[field])-8}" text-anchor="middle" fill="#8b91a8" font-size="9" font-family="DM Mono,monospace">${p[field]}%</text>`;
  }).join('');

  // X axis labels (show first, last, and every nth)
  const showEvery=Math.max(1,Math.ceil(pts.length/5));
  const xLabels=pts.map((p,i)=>{
    if(i===0||i===pts.length-1||i%showEvery===0){
      return`<text x="${xScale(i)}" y="${H-6}" text-anchor="${i===0?'start':i===pts.length-1?'end':'middle'}" fill="#5a6080" font-size="9" font-family="DM Mono,monospace">${p.dateStr||p.label}</text>`;
    }return'';
  }).join('');

  return`<div id="${elId}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:11.5px;font-weight:600;color:var(--text)">${title}</span>
      <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">Goal: ${goal}%</span>
    </div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">
      ${yLabels}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" stroke="var(--border)" stroke-width="1"/>
      ${goalLine}
      ${areaFill}
      ${polyline}
      ${circles}
      ${xLabels}
    </svg>
  </div>`;
}

function editDocLink(eid){
  const view=document.getElementById(eid+'_view');
  const edit=document.getElementById(eid+'_edit');
  if(!view||!edit)return;
  const isEditing=edit.style.display!=='none';
  view.style.display=isEditing?'flex':'none';
  edit.style.display=isEditing?'none':'flex';
  if(!isEditing)document.getElementById(eid+'_ename')?.focus();
}

function normalizeUrl(u){
  if(!u)return'';
  u=u.trim();
  if(/^https?:\/\//i.test(u))return u;
  return'https://'+u;
}

function saveDocLink(dk,uid,idx,eid){
  const name=(document.getElementById(eid+'_ename')?.value||'').trim();
  const raw=(document.getElementById(eid+'_eurl')?.value||'').trim();
  if(!raw){document.getElementById(eid+'_eurl')?.focus();toast('⚠ Please enter a URL');return;}
  const url=normalizeUrl(raw);
  const docs=gs(dk,[]);
  if(!docs[idx])return;
  docs[idx].name=name||raw;
  docs[idx].url=url;
  ss(dk,docs);
  refrDocs(dk,uid);
  toast('✓ Link updated');
}

function addDocLink(dk,uid,lid){
  const nameEl=document.getElementById(lid+'_name');
  const urlEl=document.getElementById(lid+'_url');
  if(!urlEl)return;
  const raw=(urlEl.value||'').trim();
  if(!raw){urlEl.focus();toast('⚠ Please enter a URL');return;}
  const url=normalizeUrl(raw);
  const name=(nameEl?.value||'').trim()||raw;
  const docs=gs(dk,[]);
  docs.push({name,url,isLink:true,ts:new Date().toISOString()});
  ss(dk,docs);
  if(nameEl)nameEl.value='';
  urlEl.value='';
  refrDocs(dk,uid);
  toast('✓ Link added');
}

function dIco(t){
  if(!t)return'📄';if(t.includes('pdf'))return'📕';
  if(t.includes('word')||t.includes('docx'))return'📘';
  if(t.includes('sheet')||t.includes('xlsx')||t.includes('csv'))return'📗';
  if(t.includes('image')||t.includes('png')||t.includes('jpg'))return'🖼️';
  return'📄';
}
function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

function handleF(files,dk,uid){
  for(const f of files){
    if(f.size>10485760){alert('File too large: '+f.name);continue;}
    const r=new FileReader();
    r.onload=e=>{
      const docs=gs(dk,[]);
      docs.push({name:f.name,size:fmtSz(f.size),type:f.type,ts:new Date().toISOString(),data:e.target.result});
      ss(dk,docs);refrDocs(dk,uid);toast('✓ '+f.name+' added');
    };
    r.readAsDataURL(f);
  }
}
function dropF(e,dk,uid){
  e.preventDefault();e.currentTarget?.classList.remove('dov');handleF(e.dataTransfer.files,dk,uid);
}
function refrDocs(dk,uid){
  const docs=gs(dk,[]),ul=document.getElementById(uid);if(!ul)return;
  ul.innerHTML=docs.map((d,i)=>docItem(d,i,dk,uid)).join('');
  // Show/hide empty state
  const empty=ul.parentElement?.querySelector('[data-empty]');
  if(empty)empty.style.display=docs.length?'none':'';
}
function dlDoc(dk,idx){const d=gs(dk,[])[idx];if(!d)return;const a=document.createElement('a');a.href=d.data;a.download=d.name;a.click();}
function rmDoc(dk,uid,idx){const d=gs(dk,[]);d.splice(idx,1);ss(dk,d);refrDocs(dk,uid);toast('✓ Removed');}

/* ─── RANKING SORT & FILTER ─── */
let _rankFilter='all'; // 'all' | 'risk'
let _rankSort={field:'score',dir:'desc'};

function _getRankedAgents(){
  const all=[];
  for(const sup of Object.keys(agentData))
    for(const ag of Object.keys(agentData[sup]))
      all.push({name:ag,sup,d:agentData[sup][ag]});
  return all;
}

function _applySortFilter(agents){
  let list=[...agents];
  // Filter by tier
  if(_rankFilter==='excellent') list=list.filter(a=>a.d.total>=4.8);
  else if(_rankFilter==='good')  list=list.filter(a=>a.d.total>=4.5&&a.d.total<4.8);
  else if(_rankFilter==='needs') list=list.filter(a=>a.d.total>=4.0&&a.d.total<4.5);
  else if(_rankFilter==='risk')  list=list.filter(a=>a.d.total<4.0);
  // Sort
  const {field,dir}=_rankSort;
  list.sort((a,b)=>{
    let va,vb;
    if(field==='score'){va=a.d.total;vb=b.d.total;}
    else if(field==='zd'){va=parseFloat(a.d.kpis['ZD Sat']?.result)||0;vb=parseFloat(b.d.kpis['ZD Sat']?.result)||0;}
    else if(field==='tidio'){va=parseFloat(a.d.kpis['Tidio Sat']?.result)||0;vb=parseFloat(b.d.kpis['Tidio Sat']?.result)||0;}
    return dir==='desc'?vb-va:va-vb;
  });
  return list;
}

function rankSort(field,dir){
  _rankSort={field,dir};
  // Only reset sort buttons (not tier filter buttons)
  ['zd-desc','zd-asc','tidio-desc','tidio-asc','score-desc'].forEach(id=>{
    const b=document.getElementById('sort-'+id);
    if(b)b.classList.remove('active');
  });
  const btn=document.getElementById('sort-'+field+'-'+dir);
  if(btn)btn.classList.add('active');
  _refrRanking();
}

function rankFilterTier(tier,btn){
  _rankFilter=tier;
  // Update tier button states
  ['all','excellent','good','needs','risk'].forEach(t=>{
    const b=document.getElementById('rank-f-'+t);
    if(b)b.classList.remove('active');
  });
  btn.classList.add('active');
  // Show/hide At Risk badge
  const badge=document.getElementById('rank-filter-badge');
  if(badge)badge.style.display=tier==='risk'?'':'none';
  _refrRanking();
  if(tier!=='all') document.getElementById('ranking-header')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function rankFilterAtRisk(){rankFilterTier('risk',document.getElementById('rank-f-risk'));}
function rankFilterAll(){rankFilterTier('all',document.getElementById('rank-f-all'));}

function _refrRanking(){
  const tbl=document.getElementById('ranking-table');
  if(!tbl)return;
  const agents=_getRankedAgents();
  const filtered=_applySortFilter(agents);
  tbl.innerHTML=mkRankingWithTidio(filtered);
}

  // Poor Performance group
  {id:'kpi_csat',   label:'KPI CSAT',                         parent:'poor',    cls:'cat-poor',    dot:'trend-poor'},
  {id:'kpi_iph',    label:'KPI IPH (Efficiency)',              parent:'poor',    cls:'cat-poor',    dot:'trend-poor'},
  {id:'kpi_otr',    label:'KPI One Touch (Efficiency)',        parent:'poor',    cls:'cat-poor',    dot:'trend-poor'},
  {id:'kpi_hours',  label:'KPI Hours Delivered (Productivity)',parent:'poor',    cls:'cat-poor',    dot:'trend-poor'},
  // Quality Assurance group
  {id:'qa_system',  label:'System Issues Tagging',             parent:'qa',      cls:'cat-coaching',dot:'trend-coaching'},
  {id:'qa_analysis',label:'Analysis',                          parent:'qa',      cls:'cat-coaching',dot:'trend-coaching'},
  {id:'qa_process', label:'Process',                           parent:'qa',      cls:'cat-coaching',dot:'trend-coaching'},
  {id:'qa_tone',    label:'Tone/HEARD',                        parent:'qa',      cls:'cat-coaching',dot:'trend-coaching'},
  // Concern / Pattern group
  {id:'behavior',   label:'Behavior',                          parent:'concern', cls:'cat-concern', dot:'trend-concern'},
  // Positive Trend
  {id:'positive',   label:'Positive Trend',                    parent:'positive',cls:'cat-positive',dot:'trend-positive'},
];

// Parent filter groups shown as chips
const STORY_PARENTS=[
  {id:'all',     label:'All'},
  {id:'poor',    label:'Poor Performance'},
  {id:'qa',      label:'Quality Assurance'},
  {id:'concern', label:'Concern / Pattern'},
  {id:'positive',label:'Positive Trend'},
];

function storyParent(catId){
  // Check new STORY_CATS first
  const found=STORY_CATS.find(c=>c.id===catId);
  if(found)return found.parent;
  // Legacy ID fallback: old IDs map to their closest parent group
  const legacy={
    'poor':'poor','kpi_csat':'poor','kpi_iph':'poor','kpi_otr':'poor','kpi_hours':'poor',
    'coaching':'qa','pattern':'qa','qa_system':'qa','qa_analysis':'qa','qa_process':'qa','qa_tone':'qa',
    'concern':'concern','neutral':'concern','behavior':'concern',
    'positive':'positive'
  };
  return legacy[catId]||'concern';
}

function mkStoryline(key,agName,supName){
  const sk='story_'+key;
  const entries=gs(sk,[]);
  const uid='sl_'+sl(key);

  // Grouped dropdown: optgroups per parent
  const parentLabels={'poor':'Poor Performance','qa':'Quality Assurance','concern':'Concern / Pattern','positive':'Positive Trend'};
  const grouped={};
  STORY_CATS.forEach(c=>{if(!grouped[c.parent])grouped[c.parent]=[];grouped[c.parent].push(c);});
  const catOpts=Object.entries(grouped).map(([pid,cats])=>
    `<optgroup label="${parentLabels[pid]||pid}">${cats.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</optgroup>`
  ).join('');

  // Filter chips: parent groups only
  const filterBtns=STORY_PARENTS.map((p,i)=>
    `<button class="story-tag-filter${i===0?' on':''}" onclick="filterStory('${sk}','${uid}','${p.id}',this)">${p.label}</button>`
  ).join('');

  return`<div class="storyline-panel">
    <h3>📖 Performance Storyline — ${agName}</h3>

    <!-- Add new entry -->
    <div class="story-add-row">
      <div><label>Date</label><input type="date" class="story-input mono" id="${uid}_date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label>Category</label><select class="story-input" id="${uid}_cat">${catOpts}</select></div>
      <div><label>Entry — what happened, what pattern, what was the impact?</label>
        <textarea class="story-textarea" id="${uid}_body" placeholder="Describe the performance observation, trend, coaching moment, or pattern..."></textarea></div>
      <button class="story-add-btn" onclick="addStoryEntry('${sk}','${uid}','${supName}')">＋ Log Entry</button>
    </div>

    <!-- Filter chips -->
    <div class="story-tag-row" id="${uid}_filters">${filterBtns}</div>

    <!-- Timeline -->
    <ul class="story-timeline" id="${uid}">
      ${entries.length===0?`<div class="story-empty">No entries yet — start documenting performance trends above.</div>`:
        sortStoryEntries([...entries]).map(({e,idx})=>mkStoryCard(e,idx,sk,uid)).join('')}
    </ul>
  </div>`;
}

/* Sort entries newest→oldest by entry date, falling back to logged timestamp */
function sortStoryEntries(entries){
  // Build array of {e, idx} preserving original indices (needed for edit/delete)
  const indexed=entries.map((e,idx)=>({e,idx}));
  indexed.sort((a,b)=>{
    const da=a.e.date||a.e.ts||'';
    const db=b.e.date||b.e.ts||'';
    return db.localeCompare(da); // descending: newest first
  });
  return indexed;
}

function mkStoryCard(e,idx,sk,uid){
  const cat=STORY_CATS.find(c=>c.id===e.cat)||{id:e.cat,label:e.cat,cls:'cat-neutral',dot:'trend-neutral'};
  const parent=storyParent(e.cat);
  const parentLabels={'poor':'Poor Performance','qa':'Quality Assurance','concern':'Concern / Pattern','positive':'Positive Trend'};
  const parentClsList={'poor':'cat-poor','qa':'cat-coaching','concern':'cat-concern','positive':'cat-positive'};
  return`<li class="story-entry ${cat.dot}" data-cat="${e.cat}" data-parent="${parent}" id="${uid}_entry_${idx}">
    <div class="story-card">
      <div class="story-card-header">
        <span class="story-date">${fmtD(e.ts)}</span>
        <span class="story-category ${parentClsList[parent]||'cat-neutral'}">${parentLabels[parent]||parent}</span>
        <span class="story-category ${cat.cls}" style="font-size:9px;opacity:.85">${cat.label}</span>
        <span class="story-author">${e.author||'Supervisor'}</span>
        <button class="story-edit-btn" onclick="startEditStory('${sk}','${uid}',${idx})" title="Edit">✏</button>
        <button class="story-del-btn" onclick="delStoryEntry('${sk}','${uid}',${idx})">✕</button>
      </div>
      <!-- View mode -->
      <div class="story-body-view">
        <div class="story-body">${e.body.replace(/\n/g,'<br>')}</div>
        ${e.date?`<div class="story-trend">📅 ${e.date}</div>`:''}
      </div>
      <!-- Edit mode (hidden by default) -->
      <div class="story-edit-fields">
        <textarea class="story-edit-textarea" id="${uid}_edit_body_${idx}">${e.body.replace(/</g,'&lt;')}</textarea>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap">📅 Entry Date</span>
          <input type="date" class="story-edit-date" id="${uid}_edit_date_${idx}" value="${e.date||''}">
        </div>
        <div class="story-edit-actions">
          <button class="story-save-btn" onclick="saveStoryEdit('${sk}','${uid}',${idx})">💾 Save</button>
          <button class="story-cancel-btn" onclick="cancelStoryEdit('${uid}',${idx})">Cancel</button>
        </div>
      </div>
    </div>
  </li>`;
}

function addStoryEntry(sk,uid,author){
  const dateEl=document.getElementById(uid+'_date');
  const catEl=document.getElementById(uid+'_cat');
  const bodyEl=document.getElementById(uid+'_body');
  if(!bodyEl||!bodyEl.value.trim()){bodyEl&&bodyEl.focus();return;}
  const entries=gs(sk,[]);
  const cat=catEl.value;
  entries.push({ts:new Date().toISOString(),date:dateEl?.value||'',cat,body:bodyEl.value.trim(),author});
  ss(sk,entries);
  bodyEl.value='';
  refrStory(sk,uid,author);
  toast('✓ Entry logged');
}

function delStoryEntry(sk,uid,idx){
  const entries=gs(sk,[]);entries.splice(idx,1);ss(sk,entries);
  refrStory(sk,uid,'Supervisor');toast('✓ Entry removed');
}

function refrStory(sk,uid,author){
  const entries=gs(sk,[]);
  const ul=document.getElementById(uid);if(!ul)return;
  if(entries.length===0){ul.innerHTML='<div class="story-empty">No entries yet — start documenting performance trends above.</div>';return;}
  ul.innerHTML=sortStoryEntries([...entries]).map(({e,idx})=>mkStoryCard(e,idx,sk,uid)).join('');
}

function startEditStory(sk,uid,idx){
  const li=document.getElementById(`${uid}_entry_${idx}`);
  if(!li)return;
  li.querySelector('.story-card').classList.add('story-edit-mode');
  const ta=document.getElementById(`${uid}_edit_body_${idx}`);
  if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.focus();}
}

function cancelStoryEdit(uid,idx){
  const li=document.getElementById(`${uid}_entry_${idx}`);
  if(!li)return;
  li.querySelector('.story-card').classList.remove('story-edit-mode');
}

function saveStoryEdit(sk,uid,idx){
  const entries=gs(sk,[]);
  if(!entries[idx])return;
  const body=document.getElementById(`${uid}_edit_body_${idx}`)?.value.trim();
  const date=document.getElementById(`${uid}_edit_date_${idx}`)?.value;
  if(!body){document.getElementById(`${uid}_edit_body_${idx}`)?.focus();return;}
  entries[idx].body=body;
  entries[idx].date=date||'';
  ss(sk,entries);
  // Always full re-render so date change triggers re-sort
  refrStory(sk,uid,'Supervisor');
  toast('✓ Entry updated');
}

function filterStory(sk,uid,parentId,btn){
  const wrap=document.getElementById(uid+'_filters');
  if(wrap)wrap.querySelectorAll('.story-tag-filter').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const ul=document.getElementById(uid);if(!ul)return;
  ul.querySelectorAll('.story-entry').forEach(li=>{
    li.style.display=(parentId==='all'||li.dataset.parent===parentId)?'':'none';
  });
}

/* ─── CSAT HISTORY MODAL ─── */
let _csatCtx={key:'',type:'',label:'',goal:90};

function mkSparkPreview(key,type){
  const ck='csat_'+type+'_'+key;
  const hist=gs(ck,[]);
  if(hist.length===0) return`<div style="text-align:center;font-size:10px;color:var(--text3);padding:10px 0;font-family:'DM Mono',monospace">No history — click to add</div>`;
  const recent=hist.slice(-8);
  const max=100,goal=90;
  const bars=recent.map(h=>{
    const v=parseFloat(h.score)||0;
    const hpct=Math.round((v/max)*100);
    const col=v>=goal?'var(--green)':v>=75?'var(--yellow)':'var(--red)';
    return`<div class="spark-col"><div class="spark-bar" style="height:${hpct}%;background:${col}"></div>
      <div class="spark-label">${h.week||h.date?.slice(5)||''}</div></div>`;
  }).join('');
  return`<div class="spark-wrap" style="height:40px">${bars}</div>`;
}

function openCsatModal(key,type,label,goal){
  _csatCtx={key,type,label,goal:parseFloat(goal)||90};
  document.getElementById('csat-modal-title').textContent=`${label} — Historical Scores`;
  renderCsatModal();
  document.getElementById('csat-modal').classList.add('open');
}

function closeCsatModal(){
  document.getElementById('csat-modal')?.classList.remove('open');
}

function renderCsatModal(){
  const {key,type,label,goal}=_csatCtx;
  const ck='csat_'+type+'_'+key;
  const hist=gs(ck,[]);

  // stats
  const scores=hist.map(h=>parseFloat(h.score)||0);
  const avg_s=scores.length?((scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)):'—';
  const best=scores.length?Math.max(...scores).toFixed(1):'—';
  const worst=scores.length?Math.min(...scores).toFixed(1):'—';
  const below=scores.filter(s=>s<goal).length;

  // spark chart (larger)
  let chart='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">No entries yet — add your first score below.</div>';
  if(hist.length>0){
    const bars=hist.map(h=>{
      const v=parseFloat(h.score)||0,hpct=Math.round((v/100)*100);
      const col=v>=goal?'var(--green)':v>=75?'var(--yellow)':'var(--red)';
      const wk=h.week||(h.date?h.date.slice(0,7):'');
      return`<div class="spark-col" style="min-width:32px">
        <div style="font-size:9px;color:var(--text3);margin-bottom:2px;font-family:'DM Mono',monospace">${v}%</div>
        <div class="spark-bar" style="height:${Math.max(hpct,4)}%;background:${col}"></div>
        <div class="spark-label" style="font-size:9px;margin-top:3px">${wk}</div>
      </div>`;
    }).join('');
    // goal line overlay note
    chart=`<div class="chart-canvas-wrap">
      <div style="position:absolute;right:10px;top:8px;font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace">Goal: ${goal}%</div>
      <div style="position:absolute;left:0;right:0;bottom:${goal}%;height:1px;background:rgba(245,200,66,.4);pointer-events:none;margin:0 14px"></div>
      <div class="spark-wrap" style="height:100%;align-items:flex-end;overflow-x:auto;gap:4px">${bars}</div>
    </div>`;
  }

  // rows
  const rows=hist.length===0?'<div style="text-align:center;padding:18px;color:var(--text3);font-size:12px">No records yet</div>':
    [...hist].reverse().map((h,ri)=>{
      const idx=hist.length-1-ri;
      const v=parseFloat(h.score)||0;
      return`<li class="csat-entry">
        <span class="csat-date-lbl">${h.date||'—'}</span>
        <span class="csat-score ${v>=goal?'pass':'fail'}">${v}%</span>
        <span class="csat-note">${h.note||'<span style="color:var(--text3);font-style:italic">No note</span>'}</span>
        <button class="csat-del" onclick="delCsatEntry(${idx})">✕</button>
      </li>`;
    }).join('');

  document.getElementById('csat-modal-body').innerHTML=`
    <!-- Stats row -->
    <div class="csat-stat-row">
      <div class="csat-stat"><div class="csat-stat-val">${hist.length}</div><div class="csat-stat-lbl">Manual Entries</div></div>
      <div class="csat-stat"><div class="csat-stat-val" style="color:var(--accent)">${avg_s}${avg_s!=='—'?'%':''}</div><div class="csat-stat-lbl">Avg Score</div></div>
      <div class="csat-stat"><div class="csat-stat-val" style="color:var(--green)">${best}${best!=='—'?'%':''}</div><div class="csat-stat-lbl">Best Week</div></div>
      <div class="csat-stat"><div class="csat-stat-val" style="color:${below>0?'var(--red)':'var(--green)'}">${below}</div><div class="csat-stat-lbl">Below Goal</div></div>
    </div>

    <!-- Chart -->
    <div style="margin-bottom:16px">${chart}</div>

    ${type==='zd'?renderCsatModalBadSat(key):''}
    ${type==='tidio'?renderCsatModalTidioCSV(key):''}

    <!-- Add entry -->
    <div class="csat-add-row">
      <div><label>Week / Date</label><input type="text" id="csat_new_week" class="story-input mono" placeholder="W202609 or date" style="width:100%"></div>
      <div><label>Exact Date</label><input type="date" id="csat_new_date" class="story-input mono" value="${new Date().toISOString().slice(0,10)}" style="width:100%"></div>
      <div><label>Score (%) — poor rating note / ticket ref</label><div style="display:flex;gap:6px">
        <input type="number" id="csat_new_score" class="story-input mono" placeholder="e.g. 83" min="0" max="100" style="width:80px">
        <input type="text" id="csat_new_note" class="story-input" placeholder="Root cause, ticket link, context..." style="flex:1">
      </div></div>
      <button class="csat-add-btn" onclick="addCsatEntry()">＋ Add</button>
    </div>

    <!-- History list -->
    <div style="margin-bottom:8px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Manual Score History (newest first)</div>
    <ul class="csat-history-list" id="csat-hist-list">${rows}</ul>
  `;
}

          <a href="${t.url}" target="_blank" style="margin-left:auto;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;text-decoration:none;flex-shrink:0">↗ Open Ticket</a>

function editBadSatNote(noteKey,uid){
  const display=document.getElementById(uid+'_display');
  const ta=document.getElementById(uid);
  if(!display||!ta)return;
  // Switch to edit mode
  display.style.display='none';
  ta.style.display='block';
  ta.value=gs(noteKey,'');
  // Auto-grow
  ta.style.height='auto';
  ta.style.height=Math.max(52,ta.scrollHeight)+'px';
  ta.focus();
  ta.setSelectionRange(ta.value.length,ta.value.length);
}

function saveBadSatNote(noteKey,uid){
  const ta=document.getElementById(uid);
  const display=document.getElementById(uid+'_display');
  const fb=document.getElementById(uid+'_saved');
  if(!ta)return;
  const val=ta.value;
  ss(noteKey,val);
  // Switch back to display mode
  if(display){
    display.innerHTML=val?val.replace(/\n/g,'<br>'):'<span style="color:var(--text3);font-style:italic">Add root cause, customer issue, follow-up action...</span>';
    display.style.color=val?'var(--text2)':'var(--text3)';
    display.style.borderBottom=val?'1px dashed transparent':'1px dashed var(--border)';
    display.style.display='';
  }
  ta.style.display='none';
  if(fb){fb.textContent='✓ Saved';fb.style.opacity='1';setTimeout(()=>{fb.style.opacity='0';},2000);}
  toast('✓ Root cause saved');
}

function cancelBadSatNote(uid){
  const ta=document.getElementById(uid);
  const display=document.getElementById(uid+'_display');
  if(ta)ta.style.display='none';
  if(display)display.style.display='';
}

function renderCsatModalTidioCSV(key){
  const agentName=keyToAgent(key);
  if(!agentName)return'';
  const wk=weeklyPerf[currentWeek];
  if(!wk?.tidio)return''; // no CSV uploaded for this week

  const allChats=wk.tidio[agentName]||[];
  if(!allChats.length){
    if(currentWeek==='__hardcoded__')return'';
    return`<div class="csv-badsat-section">
      <div class="csv-badsat-header">💬 Tidio Surveys — ${getActiveWeekLabel()}
        <span style="color:var(--green);font-size:10px;font-family:'DM Mono',monospace">✓ No rated chats found</span>
      </div>
      <div style="height:1px;background:var(--border);margin:14px 0"></div>
    </div>`;
  }

  const poorChats=allChats.filter(c=>c.sat<=3);
  const goodChats=allChats.filter(c=>c.sat>=4);
  const satPct=Math.round((goodChats.length/allChats.length)*100);
  const satCol=satPct>=90?'var(--green)':satPct>=75?'var(--yellow)':'var(--red)';

  // Summary stats bar
  const statsBar=`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;text-align:center;min-width:60px">
      <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--text)">${allChats.length}</div>
      <div style="font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px">Rated</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;text-align:center;min-width:60px">
      <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:${satCol}">${satPct}%</div>
      <div style="font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px">Sat Score</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;text-align:center;min-width:60px">
      <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--green)">${goodChats.length}</div>
      <div style="font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px">Good (4–5)</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;text-align:center;min-width:60px">
      <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:${poorChats.length>0?'var(--red)':'var(--green)'}">${poorChats.length}</div>
      <div style="font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px">Poor (1–3)</div>
    </div>
  </div>`;

  // Poor chats list (all 3 or lower)
  const poorRows=poorChats.length===0
    ?`<div style="padding:10px 0;color:var(--green);font-size:12px;font-family:'DM Mono',monospace">✓ No poor sat chats this week</div>`
    :poorChats.map((p,i)=>{
      // Unique key from link hash or index
      const chatId=p.link?p.link.split('/').pop().slice(0,12):('tidio_'+i);
      const noteKey='tidio_note_'+key+'_'+sl(currentWeek)+'_'+chatId;
      const savedNote=gs(noteKey,'');
      const uid='tn_'+chatId+'_'+i;
      return`<div class="tc-poor-entry sat-${p.sat}-border" style="margin-bottom:8px;display:flex;gap:12px;align-items:stretch;">
        <!-- Left: chat info -->
        <div style="flex:1;min-width:0">
          <div class="tc-poor-header" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
            <span class="sat-pill sat-${p.sat}">${satLabel(p.sat)}</span>
            <span style="font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text3)">${p.dt||''}</span>
            ${p.frt?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">FRT: ${p.frt}</span>`:''}
          </div>
          ${p.comment
            ?`<div class="tc-poor-comment" style="font-size:12.5px;color:var(--text2);line-height:1.5;margin-bottom:6px">"${p.comment}"</div>`
            :`<div style="font-size:11.5px;color:var(--text3);font-style:italic;margin-bottom:6px">No comment left</div>`}
          ${p.link?`<a class="tc-poor-link" href="${p.link}" target="_blank">🔗 Open in Tidio ↗</a>`:''}
        </div>
        <!-- Right: inline editable note -->
        <div style="width:160px;flex-shrink:0;border-left:1px solid var(--border);padding-left:12px;cursor:text;"
          onclick="editBadSatNote('${noteKey}','${uid}')">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px">
            Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:8.5px">(click)</span>
          </div>
          <!-- Display -->
          <div id="${uid}_display" style="font-size:12px;color:${savedNote?'var(--text2)':'var(--text3)'};
            font-style:${savedNote?'normal':'italic'};line-height:1.5;
            border-bottom:1px dashed ${savedNote?'transparent':'var(--border)'};">
            ${savedNote?savedNote.replace(/\n/g,'<br>'):'Add note...'}
          </div>
          <!-- Edit -->
          <textarea id="${uid}" style="display:none;width:100%;background:transparent;border:none;
            border-bottom:1px solid var(--accent);border-radius:0;
            color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;
            padding:2px 0;resize:none;outline:none;line-height:1.5;min-height:52px;"
            placeholder="Add note..."
            onblur="saveBadSatNote('${noteKey}','${uid}')"
            onkeydown="if(event.key==='Escape')cancelBadSatNote('${uid}')"
          >${savedNote.replace(/</g,'&lt;')}</textarea>
          <div id="${uid}_saved" style="font-size:9px;color:var(--green);font-family:'DM Mono',monospace;
            opacity:0;transition:opacity .3s;height:12px;margin-top:2px"></div>
        </div>
      </div>`;
    }).join('');

  return`<div class="csv-badsat-section">
    <div class="csv-badsat-header" style="margin-bottom:10px">
      💬 Tidio Surveys — ${getActiveWeekLabel()}
      <span style="background:rgba(124,93,249,.12);color:var(--accent2);border-radius:20px;font-size:9.5px;padding:2px 8px;font-family:'DM Mono',monospace">${allChats.length} rated chat${allChats.length>1?'s':''}</span>
    </div>
    ${statsBar}
    ${poorChats.length>0?`<div style="font-size:10px;color:var(--red);font-family:'DM Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">🔴 Poor Sat Chats — Ratings 1, 2, 3</div>`:''}
    ${poorRows}
    <div style="height:1px;background:var(--border);margin:14px 0"></div>
  </div>`;
}

function addCsatEntry(){
  const {key,type}=_csatCtx;
  const ck='csat_'+type+'_'+key;
  const week=document.getElementById('csat_new_week')?.value.trim();
  const date=document.getElementById('csat_new_date')?.value;
  const score=document.getElementById('csat_new_score')?.value;
  const note=document.getElementById('csat_new_note')?.value.trim();
  if(!score){document.getElementById('csat_new_score')?.focus();return;}
  const hist=gs(ck,[]);
  hist.push({week:week||date?.slice(0,7)||'',date,score:parseFloat(score),note,ts:new Date().toISOString()});
  ss(ck,hist);
  renderCsatModal();
  // refresh spark on agent page
  const zdEl=document.getElementById('zdspk_'+key);
  const tiEl=document.getElementById('tispk_'+key);
  if(zdEl&&type==='zd')zdEl.innerHTML=mkSparkPreview(key,'zd');
  if(tiEl&&type==='tidio')tiEl.innerHTML=mkSparkPreview(key,'tidio');
  toast('✓ Score added');
}

function delCsatEntry(idx){
  const {key,type}=_csatCtx;
  const ck='csat_'+type+'_'+key;
  const hist=gs(ck,[]);hist.splice(idx,1);ss(ck,hist);
  renderCsatModal();toast('✓ Removed');
}

/* ─── UTILS ─── */
function autoGrow(container){
  container.querySelectorAll('textarea').forEach(el=>{
    const grow=()=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};
    el.addEventListener('input',grow);
    // Auto-save on blur for notes textareas
    if(el.classList.contains('notes-textarea')){
      el.addEventListener('blur',()=>{
        // find save button in same panel and click it
        const panel=el.closest('.notes-panel');
        if(panel){const btn=panel.querySelector('.btn-save');if(btn)btn.click();}
      });
    }
    grow();
  });
}

    <div class="modal-header">
      <div class="modal-title" id="csat-modal-title">CSAT History</div>
      <button class="modal-close" onclick="closeCsatModal()">✕</button>
    </div>
    <div class="modal-body" id="csat-modal-body"></div>
  </div>`;
  m.addEventListener('click',e=>{if(e.target===m)closeCsatModal();});
  document.body.appendChild(m);
})();
